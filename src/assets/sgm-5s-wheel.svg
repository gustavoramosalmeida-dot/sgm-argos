<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-labelledby="title desc">
  <title id="title">Roda 5S no SGM</title>
  <desc id="desc">Diagrama conceitual: cinco princípios 5S em torno do núcleo SGM</desc>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c99c3c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="200" cy="200" r="190" fill="#0f172a" stroke="url(#ring)" stroke-width="2"/>
  <!-- 5 wedges -->
  <path d="M200 200 L200 20 A180 180 0 0 1 371 105 Z" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <path d="M200 200 L371 105 A180 180 0 0 1 371 295 Z" fill="#172033" stroke="#334155" stroke-width="1"/>
  <path d="M200 200 L371 295 A180 180 0 0 1 200 380 Z" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <path d="M200 200 L200 380 A180 180 0 0 1 29 295 Z" fill="#172033" stroke="#334155" stroke-width="1"/>
  <path d="M200 200 L29 295 A180 180 0 0 1 29 105 Z" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <path d="M200 200 L29 105 A180 180 0 0 1 200 20 Z" fill="#172033" stroke="#334155" stroke-width="1"/>
  <circle cx="200" cy="200" r="72" fill="url(#g1)" stroke="#c99c3c" stroke-width="1.5" filter="url(#soft)"/>
  <text x="200" y="195" text-anchor="middle" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="18" font-weight="700">SGM</text>
  <text x="200" y="218" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" font-weight="600">5S digital</text>
  <text x="280" y="95" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Seiri</text>
  <text x="330" y="210" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Seiton</text>
  <text x="260" y="330" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Seiso</text>
  <text x="120" y="330" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Seiketsu</text>
  <text x="70" y="210" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Shitsuke</text>
</svg>
